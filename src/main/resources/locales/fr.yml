---
block-limits:
  hit-limit: "<red>[material] limité à [number]!"
entity-limits:
  hit-limit: "<red>[entity] spawning limited to [number]!"
limits:
  panel-title: Limites de l'île
admin:
  limits:
    main:
      parameters: "<player>"
      description: affiche les limites de l'île pour le joueur
    calc:
      parameters: "<player>"
      description: recalcule les limites de l'île pour le joueur
      finished: "<green> Recomptage terminé avec succès!"
    offset:
      unknown: "<red> Matériau ou entité inconnu [name]."
      description: "permet de gérer les décalages de limites pour les matériaux et les entités"
      main:
        description: permet de gérer les décalages de limites pour les matériaux et
          les entités
      set:
        parameters: "<joueur> <matériel|entité> <numéro>"
        description: définit un nouveau décalage pour la limite de matériau ou d'entité
        success: "<green> Le décalage limite pour [name] est défini sur [number]."
        same: "<red> Le décalage limite pour [name] est déjà [number]."
      add:
        parameters: "<joueur> <matériel|entité> <numéro>"
        description: ajoute un décalage pour la limite de matériau ou d'entité
        success: "<green> Le décalage limite pour [name] est augmenté jusqu'à [number]."
      remove:
        parameters: "<joueur> <matériel|entité> <numéro>"
        description: réduit le décalage pour la limite de matériau ou d'entité
        success: "<green> Le décalage limite pour [name] est réduit jusqu'à [number]."
      reset:
        parameters: "<joueur> <matériel|entité>"
        description: supprime le décalage pour le matériau ou l'entité
        success: "<green> Le décalage limite pour [name] est défini sur 0."
      view:
        parameters: "<joueur> <matériel|entité>"
        description: affiche le décalage pour le matériau ou l'entité
        message: "<green> [name] le décalage est défini sur [number]."
island:
  limits:
    description: affichez les limites de votre île
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> Aucune limite n'est fixée dans ce monde"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Surface"
      env-nether: "Nether"
      env-end: "l'End"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> Cette île n'a pas de propriétaire"
      not-on-island: "<red> Cet emplacement n'a pas de limites définies."
    recount:
      description: recompte les limites de votre île
      now-recounting: "<aqua> Recomptage en cours. Cela peut prendre un certain temps,
        veuillez patienter..."
      in-progress: "<red> Le recomptage de l'île est en cours. Veuillez patienter s'il
        vous plaît..."
      time-out: "<red> Time out lors du recomptage. L'île est-elle vraiment grande?"
