---
block-limits:
  hit-limit: "<red>[material] limitálva ennyire [number]!"
entity-limits:
  hit-limit: "<red>[entity] idézés limitálva ennyire [number]!"
limits:
  panel-title: Sziget limitek
admin:
  limits:
    main:
      parameters: "<player>"
      description: Egy játékos sziget limitjének megtekintése
    calc:
      parameters: "<player>"
      description: Egy játékos sziget limitjének újraszámolása
      finished: "<green>A Sziget újraszámolás sikeresen befejeződött!"
    offset:
      unknown: "<red> Ismeretlen anyag vagy entitás [name]."
      description: "lehetővé teszi az anyagok és entitások limiteltolásainak kezelését"
      main:
        description: lehetővé teszi az anyagok és entitások limiteltolásainak kezelését
      set:
        parameters: "<lejátszó> <anyag|entitás> <szám>"
        description: új eltolást állít be az anyag- vagy entitáskorláthoz
        success: "<green> A [name] határeltolódása [number] értékre van állítva."
        same: "<red> A [name] korláteltolása már [number]."
      add:
        parameters: "<lejátszó> <anyag|entitás> <szám>"
        description: eltolást ad hozzá az anyag- vagy entitáskorláthoz
        success: "<green> A [name] határeltolódása a [number] értékig nő."
      remove:
        parameters: "<lejátszó> <anyag|entitás> <szám>"
        description: csökkenti az anyag- vagy entitáskorlát ellentételezését
        success: "<green> A [name] limiteltolása [number] értékre csökken."
      reset:
        parameters: "<lejátszó> <anyag|entitás>"
        description: eltávolítja az anyag vagy entitás eltolását
        success: "<green> A [name] határeltolódása 0-ra van állítva."
      view:
        parameters: "<lejátszó> <anyag|entitás>"
        description: anyag vagy entitás eltolását jeleníti meg
        message: "<green> [name] eltolás értéke [number]."
island:
  limits:
    description: Sziget limitek megtekintése
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> Nincsenek korlátok ezen a világon"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Felvilág"
      env-nether: "Nether"
      env-end: "Vég"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> Annak a szigetnek nincs gazdája"
      not-on-island: "<red> Ennek a helynek nincs korlátja beállítva."
    recount:
      description: Limitek újraszámolása a szigeteden
      now-recounting: "<aqua> Most mesélünk. Ez eltarthat egy ideig, kérem, várjon..."
      in-progress: "<red> Sziget visszaállítása folyamatban van. Kérem, várjon..."
      time-out: "<red> Időtúllépés az újraszámláláskor. Tényleg nagy a sziget?"
