---
block-limits:
  hit-limit: "<red>[material] limitado a [number]!"
entity-limits:
  hit-limit: "¡Aparición de <red>[entity] limitada a [number]!"
limits:
  panel-title: Límites de la isla
admin:
  limits:
    main:
      parameters: "<jugador>"
      description: mostrar los límites de la isla para el jugador
    calc:
      parameters: "<jugador>"
      description: recalcular los límites de la isla para el jugador
      finished: "<green> ¡El recálculo de la Isla terminó con éxito!"
    offset:
      unknown: "<red> Material o entidad desconocida [name]."
      description: "permite gestionar compensaciones de límites para materiales y entidades"
      main:
        description: permite gestionar compensaciones de límites para materiales y
          entidades
      set:
        parameters: "<jugador> <material|entidad> <número>"
        description: establece una nueva compensación para el límite de material o
          entidad
        success: "<green> El desplazamiento límite para [name] está establecido en [number]."
        same: "<red> El límite de compensación para [name] ya es [number]."
      add:
        parameters: "<jugador> <material|entidad> <número>"
        description: agrega compensación por límite de material o entidad
        success: "<green> El límite de compensación para [name] aumenta hasta [number]."
      remove:
        parameters: "<jugador> <material|entidad> <número>"
        description: reduce la compensación por límite de material o entidad
        success: "<green> La compensación límite para [name] se reduce hasta [number]."
      reset:
        parameters: "<jugador> <material|entidad>"
        description: elimina la compensación para material o entidad
        success: "<green> El desplazamiento límite para [number] está establecido en 0."
      view:
        parameters: "<jugador> <material|entidad>"
        description: muestra el desplazamiento para material o entidad
        message: "<green> desplazamiento de [name] se establece en [number]."
island:
  limits:
    description: muestra los límites de tu isla
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> No hay límites establecidos en este mundo."
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Superficie"
      env-nether: "Nether"
      env-end: "El End"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> Esa isla no tiene dueño"
      not-on-island: "<red> Esta ubicación no tiene límites establecidos."
    recount:
      description: cuenta los límites para tu isla
      now-recounting: "<aqua> Ahora contando. Esto podría tomar un tiempo, por favor espere..."
      in-progress: "<red> El recuento de la isla está en progreso. Espere por favor..."
      time-out: "<red> Ha pasado demasiado tiempo contando. ¿La isla es realmente grande?"
