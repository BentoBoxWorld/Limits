---
block-limits:
  hit-limit: "<red>[material] limitiert auf [number]!"
entity-limits:
  hit-limit: "<red>[entity] spawning limitiert auf [number]!"
limits:
  panel-title: Insel Limitierungen
admin:
  limits:
    main:
      parameters: "<player>"
      description: Zeige die Limitierungen für den Spieler an
    calc:
      parameters: "<player>"
      description: Berechne die Insel Limitierungen für den Spieler neu
      finished: "<green>Inselberechnung erfolgreich abgeschlossen!"
    offset:
      unknown: "<red> Unbekanntes Material oder Entität [name]."
      description: "ermöglicht die Verwaltung von Grenzwertverschiebungen für Materialien und Entitäten"
      main:
        description: ermöglicht die Verwaltung von Grenzwertverschiebungen für Materialien
          und Entitäten
      set:
        parameters: "<Spieler> <Material|Entität> <Nummer>"
        description: legt einen neuen Offset für Material- oder Entity-Grenzwert fest
        success: "<green> Der Grenzoffset für [name] ist auf [number] eingestellt."
        same: "<red> Der Grenzoffset für [name] ist bereits [number]."
      add:
        parameters: "<Spieler> <Material|Entität> <Nummer>"
        description: fügt einen Offset für Material- oder Entitätslimit hinzu
        success: "<green> Der Limit-Offset für [name] wird bis [number] erhöht."
      remove:
        parameters: "<Spieler> <Material|Entität> <Nummer>"
        description: reduziert den Offset für Material- oder Entitätslimit
        success: "<green> Der Grenzoffset für [name] wird auf [number] reduziert."
      reset:
        parameters: "<Spieler> <Material|Entität>"
        description: Entfernt den Offset für Material oder Entität
        success: "<green> Der Grenzoffset für [name] wird auf 0 gesetzt."
      view:
        parameters: "<Spieler> <Material|Entität>"
        description: zeigt den Offset für Material oder Entität an
        message: "<green> [name]-Offset ist auf [number] gesetzt."
island:
  limits:
    description: Zeige deine Insel Limitierungen
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> Es gibt keine Grenzen in dieser Welt"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Oberwelt"
      env-nether: "Nether"
      env-end: "Ende"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> Diese Insel hat keinen Besitzer"
      not-on-island: "<red> Für diesen Standort sind keine Beschränkungen festgelegt."
    recount:
      description: Zählt die Limitierungen für deine Insel auf
      now-recounting: "<aqua> Ich erzähle jetzt. Dies kann eine Weile dauern, bitte warten..."
      in-progress: "<red> Inselrückmeldung läuft. Warten Sie mal..."
      time-out: "<red> Zeitüberschreitung beim Erzählen. Ist die Insel wirklich so groß?"
