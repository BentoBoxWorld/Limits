---
block-limits:
  hit-limit: "<red>[material] limitado a [number]!"
entity-limits:
  hit-limit: "<red>[entity] gerando limitado a [number]!"
limits:
  panel-title: Limites da ilha
admin:
  limits:
    main:
      parameters: "<jogador>"
      description: mostrar os limites da ilha para o jogador
    calc:
      parameters: "<jogador>"
      description: recalcular os limites da ilha para o jogador
      finished: "<green> O recálculo da ilha foi concluído com sucesso!"
    offset:
      unknown: "<red> Material ou entidade desconhecida [name]."
      description: "permite gerenciar limites de deslocamento para materiais e entidades"
      main:
        description: permite gerenciar limites de deslocamento para materiais e entidades
      set:
        parameters: "<jogador> <material|entidade> <número>"
        description: define novo deslocamento para limite de material ou entidade
        success: "<green> O deslocamento de limite para [name] é definido como [number]."
        same: "<red> O deslocamento limite para [name] já é [number]."
      add:
        parameters: "<jogador> <material|entidade> <número>"
        description: adiciona deslocamento para limite de material ou entidade
        success: "<green> O deslocamento de limite para [name] é aumentado até [number]."
      remove:
        parameters: "<jogador> <material|entidade> <número>"
        description: reduz o deslocamento para o limite de material ou entidade
        success: "<green> O deslocamento de limite para [name] é reduzido até [number]."
      reset:
        parameters: "<jogador> <material|entidade>"
        description: remove deslocamento para material ou entidade
        success: "<green> O deslocamento de limite para [name] é definido como 0."
      view:
        parameters: "<jogador> <material|entidade>"
        description: exibe deslocamento para material ou entidade
        message: "<green> [name] deslocamento é definido como [number]."
island:
  limits:
    description: mostre os limites da sua ilha
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> Não há limites neste mundo"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Superfície"
      env-nether: "Nether"
      env-end: "O End"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> Aquela ilha não tem dono"
      not-on-island: "<red> Este local não possui limites definidos."
    recount:
      description: reconta limites para sua ilha
      now-recounting: "<aqua> Agora recontando. Isso pode demorar um pouco, aguarde..."
      in-progress: "<red> A recontagem da ilha está em andamento. Aguarde..."
      time-out: "<red> Tempo limite ao recontar. A ilha é realmente grande?"
