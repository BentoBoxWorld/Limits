---
block-limits:
  hit-limit: "<red>[material] bị giới hạn trong [number] khối!"
entity-limits:
  hit-limit: "<red>[entity] bị giới hạn trong [number] thực thể!"
limits:
  panel-title: Giới hạn đảo
admin:
  limits:
    main:
      parameters: "<người chơi>"
      description: xem giới hạn đảo của người chơi
    calc:
      parameters: "<người chơi>"
      description: tính toán lại giới hạn đảo của người chơi
      finished: "<green>Tính toán đã hoàn thành!"
    offset:
      unknown: "<red> Tài liệu hoặc thực thể không xác định [name]."
      description: "cho phép quản lý các giới hạn bù trừ cho vật liệu và thực thể"
      main:
        description: cho phép quản lý các giới hạn bù trừ cho vật liệu và thực thể
      set:
        parameters: "<người chơi> <vật liệu|thực thể> <số>"
        description: thiết lập độ lệch mới cho giới hạn vật liệu hoặc thực thể
        success: "<green> Độ lệch giới hạn cho [name] được đặt thành [number]."
        same: "<red> Độ lệch giới hạn cho [name] đã là [number]."
      add:
        parameters: "<người chơi> <vật liệu|thực thể> <số>"
        description: thêm độ lệch cho giới hạn vật liệu hoặc thực thể
        success: "<green> Độ lệch giới hạn cho [name] được tăng lên cho đến [number]."
      remove:
        parameters: "<người chơi> <vật liệu|thực thể> <số>"
        description: giảm độ lệch cho giới hạn vật liệu hoặc thực thể
        success: "<green> Độ lệch giới hạn cho [name] được giảm xuống đến [number]."
      reset:
        parameters: "<người chơi> <vật liệu|thực thể>"
        description: xóa phần bù cho vật liệu hoặc thực thể
        success: "<green> Độ lệch giới hạn cho [name] được đặt thành 0."
      view:
        parameters: "<người chơi> <vật liệu|thực thể>"
        description: hiển thị bù trừ cho vật liệu hoặc thực thể
        message: "<green> [name] bù trừ được đặt thành [number]."
island:
  limits:
    description: xem giới hạn đảo của bạn
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> Không có giới hạn nào được đặt ra trên thế giới này"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Thế Giới Thường"
      env-nether: "Nether"
      env-end: "End"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> Hòn đảo đó không có chủ sở hữu"
      not-on-island: "<red> Vị trí này không có giới hạn nào được đặt ra."
    recount:
      description: tính toán lại giới hạn đảo của bạn
      now-recounting: "<aqua> Đang đếm lại. Việc này có thể mất một lúc, vui lòng đợi..."
      in-progress: "<red> Đảo đang được thu hồi. Vui lòng đợi..."
      time-out: "<red> Hết giờ khi kể lại. Hòn đảo có thực sự lớn không?"
