---
block-limits:
  hit-limit: "<red>[material] limitat la [number]!"
entity-limits:
  hit-limit: "<red>[entity] reproducere limitata la [number]!"
limits:
  panel-title: Limitele insulei
admin:
  limits:
    main:
      parameters: "<jucator>"
      description: Arata limitele insulei pentru jucator
    calc:
      parameters: "<jucator>"
      description: recalculeaza limitele insulei pentru jocator
      finished: "<green>Recalcularea insulei terminata cu succes!"
    offset:
      unknown: "<red> Material sau entitate necunoscută [name]."
      description: "permite gestionarea decalajelor de limite pentru materiale și entități"
      main:
        description: permite gestionarea decalajelor de limite pentru materiale și
          entități
      set:
        parameters: "<player> <material|entity> <number>"
        description: stabilește o nouă compensare pentru limita de material sau entitate
        success: "<green> Decalajul limită pentru [name] este setat la [number]."
        same: "<red> Decalajul limită pentru [name] este deja [number]."
      add:
        parameters: "<player> <material|entity> <number>"
        description: adaugă compensare pentru limita de material sau entitate
        success: "<green> Compensarea limită pentru [name] este mărită până la [number]."
      remove:
        parameters: "<player> <material|entity> <number>"
        description: reduce compensarea pentru limita de material sau entitate
        success: "<green> Limita decalajului pentru [name] este redusă până la [number]."
      reset:
        parameters: "<player> <material|entity>"
        description: elimină decalajul pentru material sau entitate
        success: "<green> Decalajul limită pentru [name] este setat la 0."
      view:
        parameters: "<player> <material|entity>"
        description: afișează offset pentru material sau entitate
        message: "<green> [name] offset este setat la [number]."
island:
  limits:
    description: iti arata limitele insulei
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> Nu există limite stabilite în această lume"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Lumea de Suprafață"
      env-nether: "Nether"
      env-end: "End"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> Insula aceea nu are proprietar"
      not-on-island: "<red> Această locație nu are limite setate."
    recount:
      description: renumara limitele insulei tale
      now-recounting: "<aqua> Acum povestind. Acest lucru ar putea dura ceva timp, vă
        rugăm să așteptați..."
      in-progress: "<red> Recuperarea insulei este în curs. Va rugam asteptati..."
      time-out: "<red> Timpul expirat când relatați. Este insula cu adevărat mare?"
