---
block-limits:
  hit-limit: "<red>[material] limitato a [number]!"
entity-limits:
  hit-limit: "<red>[entity] la generazione è limitata a [number]!"
limits:
  panel-title: Limiti dell'isola
admin:
  limits:
    main:
      parameters: "<giocatore>"
      description: mostra i limiti dell'isola per il giocatore
    calc:
      parameters: "<giocatore>"
      description: ricalcola i limiti dell'isola per il giocatore
      finished: "<green> Il ricalcolo dell'isola è stato completato con successo!"
    offset:
      unknown: "<red> Materiale o entità sconosciuta [name]."
      description: "consente di gestire gli offset dei limiti per materiali ed entità"
      main:
        description: consente di gestire gli offset dei limiti per materiali ed entità
      set:
        parameters: "<giocatore> <materiale|entità> <numero>"
        description: imposta un nuovo offset per il limite di materiale o entità
        success: "<green> Il limite di offset per [name] è impostato su [number]."
        same: "<red> Il limite di offset per [name] è già [number]."
      add:
        parameters: "<giocatore> <materiale|entità> <numero>"
        description: aggiunge offset per limite di materiale o entità
        success: "<green> Il limite di offset per [name] è aumentato fino a [number]."
      remove:
        parameters: "<giocatore> <materiale|entità> <numero>"
        description: riduce l'offset per il limite di materiale o entità
        success: "<green> Il limite di offset per [name] è ridotto fino a [number]."
      reset:
        parameters: "<giocatore> <materiale|entità>"
        description: rimuove l'offset per materiale o entità
        success: "<green> Il limite di offset per [name] è impostato su 0."
      view:
        parameters: "<giocatore> <materiale|entità>"
        description: visualizza l'offset per materiale o entità
        message: "<green> [name] offset è impostato su [number]."
island:
  limits:
    description: mostra i limiti della tua isola
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> Non ci sono limiti in questo mondo"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Sopramondo"
      env-nether: "Nether"
      env-end: "L'End"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> Quell'isola non ha proprietario"
      not-on-island: "<red> Questa posizione non ha limiti impostati."
    recount:
      description: racconta i limiti per la tua isola
      now-recounting: "<aqua> Ora sto raccontando. Potrebbe volerci un po', attendi..."
      in-progress: "<red> Il conteggio dell'isola è in corso. Attendi..."
      time-out: "<red> Time out quando si racconta. L'isola è davvero grande?"
