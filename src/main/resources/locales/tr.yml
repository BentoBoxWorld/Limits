---
block-limits:
  hit-limit: "<yellow>[material] <dark_red>eşyasından <dark_purple>[number] <dark_red>koyabilirsin!"
entity-limits:
  hit-limit: "<yellow>[entity] <dark_red>varlığından <dark_purple>[number] <dark_red>tane koyabilirsin!"
limits:
  panel-title: "<yellow>Ada limiti"
admin:
  limits:
    main:
      parameters: "<player>"
      description: Oyuncu için ada limitlerini göster.
    calc:
      parameters: "<player>"
      description: Oyuncu için ada limitlerini tekrar hesapla.
      finished: "<green>Ada hesaplaması başarıyla yapıldı."
    offset:
      unknown: "<red> Bilinmeyen malzeme veya varlık [name]."
      description: "malzemeler ve varlıklar için limit ofsetlerini yönetmeye olanak tanır"
      main:
        description: malzemeler ve varlıklar için limit ofsetlerini yönetmeye olanak
          tanır
      set:
        parameters: "<oyuncu> <malzeme|varlık> <sayı>"
        description: malzeme veya varlık sınırı için yeni ofset ayarlar
        success: "<green>[name] için Limit ofseti [number] olarak ayarlandı."
        same: "<red> [name] için sınır ofseti zaten [number]'dır."
      add:
        parameters: "<oyuncu> <malzeme|varlık> <sayı>"
        description: malzeme veya varlık sınırı için ofset ekler
        success: "<green>[name] için Limit ofseti [number]'ya kadar artırıldı."
      remove:
        parameters: "<oyuncu> <malzeme|varlık> <sayı>"
        description: malzeme veya varlık sınırı için ofseti azaltır
        success: "<green>[name] için limit ofseti [number]'ya kadar azaltıldı."
      reset:
        parameters: "<oyuncu> <malzeme|varlık>"
        description: malzeme veya varlık için ofseti kaldırır
        success: "<green>[name] için Limit ofseti 0 olarak ayarlandı."
      view:
        parameters: "<oyuncu> <malzeme|varlık>"
        description: malzeme veya varlık için ofseti görüntüler
        message: "<green> [name] ofseti [number] olarak ayarlandı."
island:
  limits:
    description: Ada limitlerini gör.
    max-color: "<red>"
    regular-color: "<blue>"
    block-limit-syntax: "<dark_purple>[number]<gray>/<yellow>[limit]"
    no-limits: "<red> Bu dünyada hiçbir sınır belirlenmedi"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Ana Dünya"
      env-nether: "Nether"
      env-end: "End"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> O adanın bir sahibi yok"
      not-on-island: "<red> Bu lokasyonun belirlenmiş bir sınırı yok."
    recount:
      description: Ada limitlerini tekrardan hesaplar.
      now-recounting: "<aqua> Şimdi anlatmaya başlıyorum. Biraz zaman alabilir, lütfen
        bekleyin..."
      in-progress: "<red> Ada geri kazanımı devam ediyor. Lütfen bekleyin..."
      time-out: "<red> Anlatırken zaman aşımı. Ada gerçekten büyük mü?"
