---
block-limits:
  hit-limit: "<red>[material] ierobežots līdz [number]!"
entity-limits:
  hit-limit: "<red>[entity] rašanās ierobežots līdz [number]!"
limits:
  panel-title: Salas ierobežojumi
admin:
  limits:
    main:
      parameters: "<spēlētājs>"
      description: rāda salas ierobežojumus priekš spēlētāja
    calc:
      parameters: "<spēlētājs>"
      description: pārrēķinā salas ierobežojumus priekš spēlētāja
      finished: "<green>Salas ierobežojumu pārrēķināšana pabeigta!"
    offset:
      unknown: un c Nezināms materiāls vai vienība [name].
      description: "ļauj pārvaldīt limitu kompensācijas materiāliem un entītijām"
      main:
        description: ļauj pārvaldīt limitu kompensācijas materiāliem un entītijām
      set:
        parameters: "<spēlētājs> <materiāls|vienība> <skaitlis>"
        description: nosaka jaunu nobīdi materiāla vai entītijas ierobežojumam
        success: "<green> Ierobežojuma nobīde [name] ir iestatīta uz [number]."
        same: "<red> [name] limita nobīde jau ir [number]."
      add:
        parameters: "<spēlētājs> <materiāls|vienība> <skaitlis>"
        description: pievieno nobīdi materiāla vai entītijas ierobežojumam
        success: "<green> Ierobežojuma nobīde [name] tiek palielināta līdz [number]."
      remove:
        parameters: "<spēlētājs> <materiāls|vienība> <skaitlis>"
        description: samazina materiāla vai entītijas limita kompensāciju
        success: "<green> Ierobežojuma nobīde [name] tiek samazināta līdz [number]."
      reset:
        parameters: "<spēlētājs> <materiāls|vienība>"
        description: noņem materiāla vai entītijas nobīdi
        success: "<green> Ierobežojuma nobīde [name] ir iestatīta uz 0."
      view:
        parameters: "<spēlētājs> <materiāls|vienība>"
        description: parāda nobīdi materiālam vai vienībai
        message: "<green> [name] nobīde ir iestatīta uz [number]."
island:
  limits:
    description: rāda tavas salas ierobežojumus
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> Šajā pasaulē nav noteikti ierobežojumi"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "Virszeme"
      env-nether: "Nether"
      env-end: "Gals"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> Tai salai nav saimnieka"
      not-on-island: "<red> Šai vietai nav noteikti ierobežojumi."
    recount:
      description: pārrēķina ierobežojumus tavai salai
      now-recounting: "<aqua> Tagad atstāsta. Tas var aizņemt kādu laiku, lūdzu, uzgaidiet..."
      in-progress: "<red> Notiek salas atjaunošana. Lūdzu, uzgaidiet..."
      time-out: "<red> Noildze, pārskaitot. Vai tiešām sala ir liela?"
