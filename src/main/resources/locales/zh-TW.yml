---
block-limits:
  hit-limit: "<red>[material]僅限[number]！"
entity-limits:
  hit-limit: "<red>[entity] 產生僅限於 [number]！"
limits:
  panel-title: 島嶼限制
admin:
  limits:
    main:
      parameters: "<玩家>"
      description: 顯示玩家的島嶼限制
    calc:
      parameters: "<玩家>"
      description: 重新計算玩家的島嶼限制
      finished: "<green> 島嶼重新計算成功完成！"
    offset:
      unknown: "<red> 未知材料或實體[name]。"
      description: "允許管理材料和實體的限制偏移"
      main:
        description: 允許管理材料和實體的限制偏移
      set:
        parameters: "<玩家> <材質|實體> <數字>"
        description: 設定材料或實體限制的新偏移
        success: "<green> [name] 的限制偏移量設定為 [number]。"
        same: "<red> [name] 的限制偏移量已經是 [number]。"
      add:
        parameters: "<玩家> <材質|實體> <數字>"
        description: 添加材料或實體限制的偏移量
        success: "<green> [name] 的限制偏移量增加到 [number]。"
      remove:
        parameters: "<玩家> <材質|實體> <數字>"
        description: 減少材料或實體限制的偏移
        success: "<green> [name] 的限制偏移量減少到 [number]。"
      reset:
        parameters: "<玩家> <材質|實體>"
        description: 刪除材質或實體的偏移
        success: "<green> [名稱] 的限制偏移量設定為 0。"
      view:
        parameters: "<玩家> <材質|實體>"
        description: 顯示材料或實體的偏移
        message: "<green> [name] 偏移量設定為 [number]。"
island:
  limits:
    description: 顯示您的島嶼限制
    max-color: "<red>"
    regular-color: "<green>"
    block-limit-syntax: "[number]/[limit]"
    no-limits: "<red> 這個世界沒有限制"
    panel:
      title-syntax: "[title] [sort]"
      entity-group-name-syntax: "[name]"
      entity-name-syntax: "[name]"
      block-name-syntax: "[name]"
      env-overworld: "主世界"
      env-nether: "下界"
      env-end: "終界"
      A2Z: a > z
      Z2A: z > a
    errors:
      no-owner: "<red> 那島沒有主人"
      not-on-island: "<red> 該位置沒有設定限制。"
    recount:
      description: 詳細說明您的島嶼的限制
      now-recounting: "<aqua> 現在重述。這可能需要一段時間，請稍候..."
      in-progress: "<red> 島回收正在進行中。請稍等..."
      time-out: "<red> 重新計數時逾時。島真的很大嗎？"
